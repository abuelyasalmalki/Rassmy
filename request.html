<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رسمي | الطلب</title>
  <meta
    name="description"
    content="أكمل طلب موقعك وأدخل بياناتك الأساسية لنبدأ تخصيص موقعك."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/request.css">
</head>
<body>

  <header class="site-header home-header-minimal">
    <div class="container home-header-inner">
      <a href="index.html" class="brand" aria-label="رسمي">
        <img src="logo-full.png" alt="رسمي" class="brand-logo">
      </a>

      <a href="login.html" class="login-mini-btn" id="accountBtn">دخول</a>
    </div>
  </header>

  <main class="request-page">
    <section class="request-intro-section">
      <div class="container">
        <div class="request-intro-copy">
          <h1>أكمل طلب موقعك</h1>
          <p>أدخل بياناتك الأساسية لنبدأ تخصيص موقعك.</p>
        </div>
      </div>
    </section>

    <section class="request-form-section">
      <div class="container">
        <div class="request-progress-wrap" aria-hidden="true">
          <div class="request-progress-track">
            <span class="request-progress-fill" id="requestProgressFill"></span>
          </div>
        </div>

        <div class="request-card request-form-card">
          <form class="request-form" id="requestForm">
            <div class="request-stage" data-stage="1">
              <div class="request-form-row">
                <div class="request-field">
                  <label for="package">الباقة</label>
                  <select id="package">
                    <option value="">اختر الباقة</option>
                    <option value="باقة بلس">Plus</option>
                    <option value="باقة برو">Pro</option>
                  </select>
                </div>

                <div class="request-field">
                  <label for="cycle">نوع الاشتراك</label>
                  <select id="cycle">
                    <option value="">اختر نوع الاشتراك</option>
                    <option value="شهري">شهري</option>
                    <option value="سنوي">سنوي</option>
                  </select>
                </div>
              </div>

              <div class="request-form-row request-form-row-single">
                <div class="request-field">
                  <label for="template">النموذج المختار</label>
                  <select id="template">
                    <option value="">اختر النموذج</option>
                    <option value="راحتك">راحتك</option>
                    <option value="هائل">هائل</option>
                    <option value="كافورا">كافورا</option>
                    <option value="لذة الشواء">لذة الشواء</option>
                    <option value="جمالك">جمالك</option>
                    <option value="آفاق">آفاق</option>
                  </select>
                </div>
              </div>

              <div class="request-plan-note" id="planNote">
                اختر الباقة ونوع الاشتراك ليظهر الملخص هنا.
              </div>

              <div class="request-stage-actions">
                <button id="nextStepBtn" class="request-submit-btn" type="button">التالي</button>
              </div>
            </div>

            <div class="request-stage" data-stage="2" hidden>
              <div class="request-form-row">
                <div class="request-field">
                  <label for="name">اسم التاجر</label>
                  <input id="name" placeholder="اكتب اسم التاجر">
                </div>

                <div class="request-field">
                  <label for="activityName">اسم النشاط</label>
                  <input id="activityName" placeholder="اكتب اسم النشاط">
                </div>
              </div>

              <div class="request-form-row">
                <div class="request-field">
                  <label for="activityType">نوع النشاط</label>
                  <select id="activityType">
                    <option value="">اختر نوع النشاط</option>
                    <option value="خدمات">خدمات</option>
                    <option value="بيع منتجات">بيع منتجات</option>
                    <option value="مطعم / كوفي">مطعم / كوفي</option>
                    <option value="عيادة">عيادة</option>
                    <option value="شركة">شركة</option>
                    <option value="مؤسسة">مؤسسة</option>
                    <option value="شخصي">شخصي</option>
                    <option value="أخرى">أخرى</option>
                  </select>
                </div>

                <div class="request-field">
                  <label for="customType">نوع النشاط المخصص</label>
                  <input id="customType" placeholder="اكتب نوع النشاط" style="display:none;">
                </div>
              </div>

              <div class="request-form-row">
                <div class="request-field">
                  <label for="phone">رقم الجوال</label>
                  <input id="phone" placeholder="05xxxxxxxx">
                  <div class="request-small-text">سيتم استخدامه لتسجيل الدخول</div>
                </div>

                <div class="request-field">
                  <label for="password">كلمة المرور</label>
                  <div class="request-password-wrap">
                    <input id="password" type="password" placeholder="كلمة المرور (6 أحرف على الأقل)">
                    <button type="button" id="togglePasswordBtn" aria-label="إظهار أو إخفاء كلمة المرور">
                      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                        <circle cx="12" cy="12" r="3"/>
                      </svg>
                    </button>
                  </div>
                </div>
              </div>

              <div class="request-stage-actions request-stage-actions-split">
                <button id="prevStepBtn" class="request-back-btn" type="button">السابق</button>
                <button id="submitBtn" class="request-submit-btn" type="button">إتمام طلب الموقع</button>
              </div>
            </div>
          </form>

          <div class="request-link">
            لديك حساب؟ <a href="login.html">تسجيل الدخول</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© رسمي — جميع الحقوق محفوظة</p>
    </div>
  </footer>

  <script type="module" src="assets/request.js"></script>
</body>
</html>
