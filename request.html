<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رسمي | الطلب</title>
  <meta
    name="description"
    content="أكمل طلب موقعك وأدخل بياناتك الأساسية لنبدأ تخصيص موقعك."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/request.css">
</head>
<body>

  <header class="site-header home-header-minimal">
    <div class="container home-header-inner">
      <a href="index.html" class="brand" aria-label="رسمي">
        <img src="logo-full.png" alt="رسمي" class="brand-logo">
      </a>

      <a href="login.html" class="login-mini-btn" id="accountBtn">دخول</a>
    </div>
  </header>

  <main class="request-page">
    <section class="request-intro-section">
      <div class="container">
        <div class="request-intro-copy">
          <h1>أكمل طلب موقعك</h1>
          <p>أدخل بياناتك الأساسية لنبدأ تخصيص موقعك.</p>
        </div>
      </div>
    </section>

    <section class="request-form-section">
      <div class="container">
        <div class="request-progress-wrap" aria-hidden="true">
          <div class="request-progress-track">
            <span class="request-progress-fill" id="requestProgressFill"></span>
          </div>
        </div>

        <div class="request-card request-form-card">
          <form class="request-form" id="requestForm">
            <div class="request-stage" data-stage="1">
              <div class="request-form-row">
                <div class="request-field">
                  <label for="package">الباقة</label>
                  <select id="package">
                    <option value="">اختر الباقة</option>
                    <option value="باقة بلس">Plus</option>
                    <option value="باقة برو">Pro</option>
                  </select>
                </div>

                <div class="request-field">
                  <label for="cycle">نوع الاشتراك</label>
                  <select id="cycle">
                    <option value="">اختر نوع الاشتراك</option>
                    <option value="شهري">شهري</option>
                    <option value="سنوي">سنوي</option>
                  </select>
                </div>
              </div>

              <div class="request-form-row request-form-row-single">
                <div class="request-field">
                  <label for="template">النموذج المختار</label>
                  <select id="template">
                    <option value="">اختر النموذج</option>
                    <option value="راحتك">راحتك</option>
                    <option value="هائل">هائل</option>
                    <option value="كافورا">كافورا</option>
                    <option value="لذة الشواء">لذة الشواء</option>
                    <option value="جمالك">جمالك</option>
                    <option value="آفاق">آفاق</option>
                  </select>
                </div>
              </div>

              <div class="request-plan-note" id="planNote">
                اختر الباقة ونوع الاشتراك ليظهر الملخص هنا.
              </div>

              <div class="request-stage-actions">
                <button id="nextStepBtn" class="request-submit-btn" type="button">التالي</button>
              </div>
            </div>

            <div class="request-stage" data-stage="2" hidden>
              <div class="request-form-row">
                <div class="request-field">
                  <label for="name">اسم التاجر</label>
                  <input id="name" placeholder="اكتب اسم التاجر">
                </div>

                <div class="request-field">
                  <label for="activityName">اسم النشاط</label>
                  <input id="activityName" placeholder="اكتب اسم النشاط">
                </div>
              </div>

              <div class="request-form-row">
                <div class="request-field">
                  <label for="activityType">نوع النشاط</label>
                  <select id="activityType">
                    <option value="">اختر نوع النشاط</option>
                    <option value="خدمات">خدمات</option>
                    <option value="بيع منتجات">بيع منتجات</option>
                    <option value="مطعم / كوفي">مطعم / كوفي</option>
                    <option value="عيادة">عيادة</option>
                    <option value="شركة">شركة</option>
                    <option value="مؤسسة">مؤسسة</option>
                    <option value="شخصي">شخصي</option>
                    <option value="أخرى">أخرى</option>
                  </select>
                </div>

                <div class="request-field">
                  <label for="customType">نوع النشاط المخصص</label>
                  <input id="customType" placeholder="اكتب نوع النشاط" style="display:none;">
                </div>
              </div>

              <div class="request-form-row">
                <div class="request-field">
                  <label for="phone">رقم الجوال</label>
                  <input id="phone" placeholder="05xxxxxxxx">
                  <div class="request-small-text">سيتم استخدامه لتسجيل الدخول</div>
                </div>

                <div class="request-field">
                  <label for="password">كلمة المرور</label>
                  <div class="request-password-wrap">
                    <input id="password" type="password" placeholder="كلمة المرور (6 أحرف على الأقل)">
                    <button type="button" id="togglePasswordBtn" aria-label="إظهار أو إخفاء كلمة المرور">
                      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                        <circle cx="12" cy="12" r="3"/>
                      </svg>
                    </button>
                  </div>
                </div>
              </div>

              <div class="request-stage-actions request-stage-actions-split">
                <button id="prevStepBtn" class="request-back-btn" type="button">السابق</button>
                <button id="submitBtn" class="request-submit-btn" type="button">إتمام طلب الموقع</button>
              </div>
            </div>
          </form>

          <div class="request-link">
            لديك حساب؟ <a href="login.html">تسجيل الدخول</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© رسمي — جميع الحقوق محفوظة</p>
    </div>
  </footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyAxshsDZ4yWv6TuinFTx1qMComAJYhqUZI",
  authDomain:"site-orders-415e4.firebaseapp.com",
  projectId:"site-orders-415e4"
});

const db = getFirestore(app);
const auth = getAuth(app);

const accountBtn = document.getElementById("accountBtn");

if (accountBtn) {
  onAuthStateChanged(auth, (user) => {
    if (user) {
      accountBtn.textContent = "حسابي";
      accountBtn.href = "account.html";
    } else {
      accountBtn.textContent = "دخول";
      accountBtn.href = "login.html";
    }
  });
}

const activityTypeEl = document.getElementById("activityType");
const customTypeEl = document.getElementById("customType");
const packageEl = document.getElementById("package");
const templateEl = document.getElementById("template");
const cycleEl = document.getElementById("cycle");
const passwordEl = document.getElementById("password");
const togglePasswordBtn = document.getElementById("togglePasswordBtn");
const submitBtn = document.getElementById("submitBtn");
const planNoteEl = document.getElementById("planNote");

const nextStepBtn = document.getElementById("nextStepBtn");
const prevStepBtn = document.getElementById("prevStepBtn");
const stageOneEl = document.querySelector('[data-stage="1"]');
const stageTwoEl = document.querySelector('[data-stage="2"]');
const requestProgressFill = document.getElementById("requestProgressFill");

function normalizePlanParam(value){
  const map = {
    plus: "باقة بلس",
    basic: "باقة بلس",
    pro: "باقة برو",
    premium: "باقة برو",
    "باقة بلس": "باقة بلس",
    "باقة برو": "باقة برو"
  };
  return map[value] || value || "";
}

function normalizeCycleParam(value){
  const map = {
    monthly: "شهري",
    month: "شهري",
    yearly: "سنوي",
    annual: "سنوي",
    year: "سنوي",
    "شهري": "شهري",
    "سنوي": "سنوي"
  };
  return map[value] || value || "";
}

function updatePlanNote(){
  const selectedPlan = packageEl.value;
  const selectedCycle = cycleEl.value;

  if(!selectedPlan){
    planNoteEl.textContent = "اختر الباقة ونوع الاشتراك ليظهر الملخص هنا.";
    return;
  }

  if(!selectedCycle){
    planNoteEl.textContent = "اختر نوع الاشتراك ليظهر الملخص هنا.";
    return;
  }

  if(selectedPlan === "باقة بلس" && selectedCycle === "شهري"){
    planNoteEl.textContent = "79 ريال شهريًا + رسوم تخصيص أولية.";
    return;
  }

  if(selectedPlan === "باقة بلس" && selectedCycle === "سنوي"){
    planNoteEl.textContent = "750 ريال سنويًا — التخصيص مجاني.";
    return;
  }

  if(selectedPlan === "باقة برو" && selectedCycle === "شهري"){
    planNoteEl.textContent = "159 ريال شهريًا + رسوم تخصيص أولية.";
    return;
  }

  if(selectedPlan === "باقة برو" && selectedCycle === "سنوي"){
    planNoteEl.textContent = "1299 ريال سنويًا — التخصيص مجاني.";
  }
}

function setStep(step){
  const isStepOne = step === 1;

  stageOneEl.hidden = !isStepOne;
  stageTwoEl.hidden = isStepOne;

  if (requestProgressFill) {
    requestProgressFill.style.width = isStepOne ? "50%" : "100%";
  }

  window.scrollTo({ top: 0, behavior: "smooth" });
}

function validateStepOne(){
  if(!packageEl.value) throw "اختر الباقة";
  if(!cycleEl.value) throw "اختر نوع الاشتراك";
  if(!templateEl.value) throw "اختر النموذج";
}

activityTypeEl.onchange = () => {
  customTypeEl.style.display = activityTypeEl.value === "أخرى" ? "block" : "none";
};

togglePasswordBtn.addEventListener("click", () => {
  passwordEl.type = passwordEl.type === "password" ? "text" : "password";
});

packageEl.addEventListener("change", updatePlanNote);
cycleEl.addEventListener("change", updatePlanNote);

nextStepBtn.addEventListener("click", () => {
  try{
    validateStepOne();
    setStep(2);
  }catch(error){
    alert(error.message || error);
  }
});

prevStepBtn.addEventListener("click", () => {
  setStep(1);
});

(function applyQueryParams(){
  const params = new URLSearchParams(window.location.search);

  const modelParam = (params.get("model") || params.get("template") || "").trim();
  const planParam = normalizePlanParam((params.get("plan") || "").trim().toLowerCase());
  const cycleParam = normalizeCycleParam((params.get("cycle") || "").trim().toLowerCase());

  if(modelParam){
    for(const option of templateEl.options){
      if(option.value === modelParam){
        templateEl.value = modelParam;
        break;
      }
    }
  }

  if(planParam){
    for(const option of packageEl.options){
      if(option.value === planParam){
        packageEl.value = planParam;
        break;
      }
    }
  }

  if(cycleParam){
    for(const option of cycleEl.options){
      if(option.value === cycleParam){
        cycleEl.value = cycleParam;
        break;
      }
    }
  }

  updatePlanNote();
  setStep(1);
})();

submitBtn.onclick = async () => {
  submitBtn.innerText = "جاري الإرسال...";
  submitBtn.disabled = true;

  try{
    const name = document.getElementById("name").value.trim();
    const activityName = document.getElementById("activityName").value.trim();
    let activityType = activityTypeEl.value;
    const customTypeVal = customTypeEl.value.trim();
    const selectedPackage = packageEl.value;
    const cycle = cycleEl.value;
    const template = templateEl.value;
    const phone = document.getElementById("phone").value.trim();
    const password = passwordEl.value;

    if(activityType === "أخرى"){
      activityType = customTypeVal;
    }

    if(name.length < 3) throw "اكتب اسم التاجر";
    if(activityName.length < 2) throw "اكتب اسم النشاط";
    if(!activityType) throw "اختر نوع النشاط";
    if(!selectedPackage) throw "اختر الباقة";
    if(!cycle) throw "اختر نوع الاشتراك";
    if(!template) throw "اختر النموذج";
    if(!/^\\d{10}$/.test(phone)) throw "رقم الجوال غير صحيح";
    if(password.length < 6) throw "كلمة المرور ضعيفة";

    const email = phone + "@user.com";

    let user;

    try{
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      user = cred.user;
    }catch(err){
      if(err.code === "auth/email-already-in-use"){
        const cred = await signInWithEmailAndPassword(auth, email, password);
        user = cred.user;
      }else{
        throw err;
      }
    }

    const orderRef = doc(db,"orders", user.uid);
    const orderSnap = await getDoc(orderRef);

    const orderData = {
      name,
      activityName,
      activityType,
      package: selectedPackage,
      billingCycle: cycle,
      template,
      phone,
      status:"تم تقديم الطلب",
      userId:user.uid,
      orderId:"ORD-"+Date.now(),
      createdAt: serverTimestamp()
    };

    if(!orderSnap.exists()){
      await setDoc(orderRef, orderData);
    }else{
      await setDoc(orderRef, {
        ...orderData,
        updatedAt: serverTimestamp()
      }, { merge: true });
    }

    const userRef = doc(db,"users", user.uid);
    const userSnap = await getDoc(userRef);

    if(!userSnap.exists()){
      await setDoc(userRef,{
        name,
        phone,
        role:"client",
        createdAt: serverTimestamp()
      });
    }else{
      await setDoc(userRef,{
        name,
        phone,
        updatedAt: serverTimestamp()
      }, { merge: true });
    }

    const subRef = doc(db,"subscriptions", user.uid);
    const subSnap = await getDoc(subRef);

    const subscriptionData = {
      userId: user.uid,
      name,
      phone,
      status: "جاري التفعيل",
      plan: selectedPackage,
      billingCycle: cycle,
      template,
      siteUrl: "",
      hostingDate: "",
      domainDate: "",
      updatedAt: serverTimestamp()
    };

    if(!subSnap.exists()){
      await setDoc(subRef,{
        subId: "SUB-" + Math.floor(100000 + Math.random() * 900000),
        ...subscriptionData,
        createdAt: serverTimestamp()
      });
    }else{
      await setDoc(subRef, subscriptionData, { merge: true });
    }

    const msg = document.createElement("div");
    msg.className = "request-success-toast";
    msg.innerText = "✅ تم إرسال الطلب بنجاح\nجاري تحويلك...";
    document.body.appendChild(msg);

    setTimeout(() => {
      window.location.href = "account.html";
    }, 1200);

  }catch(e){
    alert(e.message || e);
  }finally{
    submitBtn.innerText = "إتمام طلب الموقع";
    submitBtn.disabled = false;
  }
};
</script>

</body>
</html>
