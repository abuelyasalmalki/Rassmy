<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تم تقديم الطلب</title>

<style>
body{font-family:Tahoma;background:#f7f7f7;margin:0}

.container{max-width:900px;margin:auto;padding:20px}

.nav{display:flex;gap:10px;margin-bottom:15px}

.nav a{
flex:1;
text-align:center;
padding:10px;
background:#eee;
border-radius:8px;
text-decoration:none;
color:#111;
}

.nav a.active{
background:#111;
color:#fff;
}

.card{
background:#fff;
padding:20px;
border-radius:12px;
margin-bottom:15px;
border:1px solid #eee;
}

.logout{
background:#dc3545;
padding:8px 14px;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
margin-bottom:10px;
}

input,select{
width:100%;
margin:6px 0;
padding:8px;
border-radius:6px;
border:1px solid #ddd;
font-size:13px;
}

.search{
padding:10px;
border-radius:8px;
border:1px solid #ddd;
width:100%;
}

.load-more{
padding:10px;
background:#111;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
width:100%;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>تم تقديم الطلب</h2>

<div style="display:flex;gap:5px;margin-bottom:15px;">
<input id="searchInput" class="search" placeholder="بحث برقم الجوال..." style="flex:1">
<button id="searchBtn" style="padding:10px;border:none;border-radius:8px;background:#111;color:#fff;cursor:pointer;">
بحث
</button>
</div>

<div id="count">📦 الطلبات: 0</div>

<button class="logout" id="logoutBtn">تسجيل خروج</button>

<div class="nav">
<a href="admin.html" class="active">تم تقديم الطلب</a>
<a href="admin-processing.html">قيد التنفيذ</a>
<a href="admin-done.html">مكتمل</a>
<a href="admin-subscriptions.html">الاشتراكات</a>
</div>

<div id="orders"></div>

<button id="loadMoreBtn" class="load-more">تحميل المزيد</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyAxshsDZ4yWv6TuinFTx1qMComAJYhqUZI",
authDomain:"site-orders-415e4.firebaseapp.com",
projectId:"site-orders-415e4"
});

const db = getFirestore(app);
const auth = getAuth(app);

let allOrders = [];
let visibleCount = 10;

document.getElementById("logoutBtn").onclick = ()=>{
signOut(auth).then(()=>location.href="admin-login.html");
};

onAuthStateChanged(auth, async (user)=>{

if(!user){
location.href="admin-login.html";
return;
}

if(user.email !== "abuelyasalmalki@gmail.com"){
document.body.innerHTML = "غير مصرح ❌";
return;
}

const q = query(collection(db,"orders"), orderBy("createdAt","desc"));
const snapshot = await getDocs(q);

allOrders = snapshot.docs.map(d=>({id:d.id,...d.data()}));

render();

});

function render(){

const search = document.getElementById("searchInput").value.trim();

const filtered = allOrders.filter(o=>{
return !search || (o.phone && o.phone.includes(search));
});

const submitted = filtered.filter(o=>o.status==="تم تقديم الطلب");

const slice = search ? submitted : submitted.slice(0, visibleCount);

let html = "";

slice.forEach((data)=>{

const id = data.id;

let orderDate = "-";
if(data.createdAt?.seconds){
orderDate = new Date(data.createdAt.seconds * 1000).toLocaleDateString('ar-SA');
}

html += `
<div class="card">

<b>${data.name || ""}</b><br>

🧾 ${data.orderId || "-"}<br>
📅 ${orderDate}<br>

📱 ${data.phone || ""}<br>
🏷️ ${data.activityName || ""}<br>
🧩 ${data.activityType || ""}<br>

<select id="s-${id}">
<option ${data.status==="تم تقديم الطلب"?"selected":""}>تم تقديم الطلب</option>
<option ${data.status==="قيد التنفيذ"?"selected":""}>قيد التنفيذ</option>
<option ${data.status==="مكتمل"?"selected":""}>مكتمل</option>
</select>

<select id="pay-${id}">
<option value="غير مدفوع" ${data.paymentStatus==="غير مدفوع"?"selected":""}>غير مدفوع</option>
<option value="تم الدفع" ${data.paymentStatus==="تم الدفع"?"selected":""}>تم الدفع</option>
<option value="دفع جزئي" ${data.paymentStatus==="دفع جزئي"?"selected":""}>دفع جزئي</option>
</select>

<input id="inv-${id}" placeholder="رابط الفاتورة" value="${data.invoiceUrl || ""}">

<button onclick="updateStatus('${id}')">حفظ</button>

</div>
`;

});

document.getElementById("orders").innerHTML = html || "لا يوجد طلبات";

document.getElementById("count").innerText =
"📦 الطلبات: " + submitted.length;

}

document.getElementById("searchBtn").onclick = ()=>{
visibleCount = 10;
render();
};

document.getElementById("searchInput").addEventListener("keypress",(e)=>{
if(e.key === "Enter"){
visibleCount = 10;
render();
}
});

document.getElementById("loadMoreBtn").onclick = ()=>{
visibleCount += 10;
render();
};

window.updateStatus = async (id)=>{
await updateDoc(doc(db,"orders",id),{
status: document.getElementById("s-"+id).value,
paymentStatus: document.getElementById("pay-"+id).value,
invoiceUrl: document.getElementById("inv-"+id).value
});

location.reload(); // 🔥 هذا التعديل
};

</script>

</body>
</html>
