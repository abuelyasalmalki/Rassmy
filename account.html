<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حسابي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/account.css">
</head>

<body>

<header class="site-header">
  <div class="container account-header-inner">
    <div class="account-header-side">
      <a href="index.html" class="brand" aria-label="رسمي">
        <img src="logo-full.png" alt="رسمي">
      </a>

      <div class="header-user">
        <div class="avatar" id="avatar">؟</div>
        <div class="header-user-text">
          <strong>حسابي</strong>
          <div id="userName" class="username"></div>
        </div>
      </div>
    </div>

    <button onclick="logout()" class="logout-btn">خروج</button>
  </div>
</header>

<main class="account-page">
  <div class="container">
    <div class="account-page-head">
      <h1>حسابي</h1>
    </div>

    <div id="orders" class="account-grid"></div>
  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyAxshsDZ4yWv6TuinFTx1qMComAJYhqUZI",
  authDomain:"site-orders-415e4.firebaseapp.com",
  projectId:"site-orders-415e4"
});

const db = getFirestore(app);
const auth = getAuth(app);

const orders = document.getElementById("orders");
const userName = document.getElementById("userName");
const avatar = document.getElementById("avatar");

window.logout = ()=> signOut(auth).then(()=>location.href="login.html");

window.showSoon = ()=>{
  const msg = document.createElement("div");

  msg.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M2 12h20"/>
        <path d="M12 2a15 15 0 0 1 0 20"/>
        <path d="M12 2a15 15 0 0 0 0 20"/>
      </svg>
      <span>الميزة متاحة بعد اكتمال موقعك</span>
    </div>
  `;

  msg.className = "request-success-toast";
  document.body.appendChild(msg);
  setTimeout(()=>msg.remove(),2000);
};

onAuthStateChanged(auth, async (user)=>{

  if(!user){
    location.href="login.html";
    return;
  }

  try{
    const orderSnap = await getDoc(doc(db,"orders",user.uid));
    const subSnap = await getDoc(doc(db,"subscriptions",user.uid));

    if(!orderSnap.exists()){
      orders.innerHTML = `<div class="empty-card">لا يوجد طلب بعد</div>`;
      return;
    }

    const d = orderSnap.data();
    const sub = subSnap.exists() ? subSnap.data() : {};

    const domainStatusLabels = {
      not_selected: "لم يتم اختيار دومين بعد",
      domain_later: "بانتظار اختيار الدومين",
      pending_purchase: "تم استلام اختيارك وجاري حجز الدومين",
      purchased: "تم حجز الدومين",
      connecting: "جاري ربط الدومين بالموقع",
      connected: "تم ربط الدومين بنجاح",
      client_has_domain: "تم استلام دومينك وجاري مراجعته",
      needs_review: "تم استلام الدومين وجاري مراجعته",
      needs_client_action: "نحتاج إجراء من طرفك لإكمال الربط",
      failed: "توجد مشكلة في ربط الدومين، وسنتواصل معك"
    };

    const selectedDomain = d.domain || sub.domain || "";
    const selectedDomainStatus = d.domainStatus || sub.domainStatus || (sub.domainDate ? "connected" : "not_selected");
    const domainText = selectedDomain || "لم يتم اختيار دومين بعد";
    const domainStatusText = domainStatusLabels[selectedDomainStatus] || "بانتظار المراجعة";
    const domainBadgeClass = selectedDomainStatus === "connected" ? "badge-green" : "badge-yellow";

    userName.innerText = d.name ? d.name : "—";
    avatar.innerText = d.name ? d.name.charAt(0) : "?";

    let step=1, percent=33, statusText="تم تقديم الطلب", cls="s1", msg="جاري التواصل معك";

    if(d.status==="قيد التنفيذ"){
      step=2; percent=66; statusText="قيد التنفيذ"; cls="s2"; msg="فريقنا يعمل على موقعك";
    }

    if(d.status==="مكتمل"){
      step=3; percent=100; statusText="مكتمل"; cls="s3"; msg="موقعك جاهز";
    }

    let orderDate = "—";
    if(d.createdAt?.seconds){
      orderDate = new Date(d.createdAt.seconds * 1000).toLocaleDateString('ar-SA');
    }

    const hostingBadge = sub.status==="مفعل"
      ? `<span class="badge badge-green">مفعلة</span>`
      : `<span class="badge badge-red">غير مفعلة</span>`;

    const domainBadge = `<span class="badge ${domainBadgeClass}">${domainStatusText}</span>`;

    orders.innerHTML = `
      <section class="account-card">
        <div class="account-card-body">
          <div class="account-section-head">
            <h2>معلومات الاشتراك</h2>
            <span class="account-soft-tag">${sub.subId || "-"}</span>
          </div>

          <div class="account-summary">
            <div class="summary-card">
              <span>نوع الاشتراك</span>
              <strong>${sub.plan || "Plus"}</strong>
            </div>

            <div class="summary-card">
              <span>الاستضافة</span>
              <strong>${sub.status || "جاري التفعيل"}</strong>
            </div>

            <div class="summary-card">
              <span>رابط الموقع</span>
              <strong>${sub.siteUrl ? "متوفر" : "سيتم إضافته لاحقًا"}</strong>
            </div>
          </div>

          <div class="sub-box">
            <div class="sub-row">
              <strong>ID:</strong> ${sub.subId || "-"}
            </div>

            <div class="sub-row">
              <strong>رابط الموقع:</strong>
              ${sub.siteUrl
                ? `<a class="link" href="${sub.siteUrl}" target="_blank">زيارة الموقع</a>`
                : "سيتم إضافته لاحقًا"}
            </div>

            <div class="sub-row">
              <strong>الاستضافة:</strong>
              ${hostingBadge}
            </div>

            <div class="sub-row">
              <strong>الدومين:</strong>
              ${domainText}
              ${domainBadge}
            </div>

            <div class="sub-row">
              <strong>نوع الاشتراك:</strong>
              ${sub.plan || "Plus"}
              <span class="inline-actions">
                <button class="inline-btn" onclick="showSoon()">ترقية</button>
              </span>
            </div>

            <div class="sub-row price">
              <strong>السعر:</strong> السنة الأولى مجانا<br>
              التجديد القادم بعد سنة 299 ريال فقط
              <span class="inline-actions">
                <button class="inline-btn" onclick="showSoon()">تجديد</button>
              </span>
            </div>
          </div>
        </div>
      </section>

      <section class="account-card">
        <div class="account-card-body">
          <div class="account-section-head">
            <h2>طلباتي</h2>
            <span class="account-soft-tag">طلب تصميم موقع</span>
          </div>

          <div class="status ${cls}">${statusText}</div>

          <div class="progress-bar">
            <div class="progress-fill" style="width:${percent}%"></div>
          </div>

          <div class="progress">
            <div class="step ${step>=1?"active":""}">تم الطلب</div>
            <div class="step ${step>=2?"active":""}">تنفيذ</div>
            <div class="step ${step>=3?"active":""}">مكتمل</div>
          </div>

          <div class="note">${msg}</div>

          <div class="order-grid">
            <div class="order-item">
              <span>رقم الطلب</span>
              <strong>${d.orderId || "-"}</strong>
            </div>

            <div class="order-item">
              <span>تاريخ الطلب</span>
              <strong>${orderDate}</strong>
            </div>

            <div class="order-item">
              <span>اسم العميل</span>
              <strong>${d.name || "-"}</strong>
            </div>

            <div class="order-item">
              <span>الجوال</span>
              <strong>${d.phone || ""}</strong>
            </div>

            <div class="order-item">
              <span>اسم النشاط</span>
              <strong>${d.activityName || ""}</strong>
            </div>

            <div class="order-item">
              <span>الدومين</span>
              <strong>${domainText}</strong>
            </div>

            <div class="order-item">
              <span>حالة الدومين</span>
              <strong>${domainStatusText}</strong>
            </div>

            <div class="order-item">
              <span>نوع النشاط</span>
              <strong>${d.activityType || ""}</strong>
            </div>
          </div>
        </div>
      </section>
    `;

  }catch(e){
    console.error(e);
    orders.innerHTML = `<div class="empty-card">خطأ في تحميل البيانات</div>`;
  }

});
</script>

</body>
</html>
