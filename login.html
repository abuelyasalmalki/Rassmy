<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>
<link rel="stylesheet" href="assets/login.css">
</head>

<body>

<div class="login-container">
  <div class="login-layout">
    <div class="login-card login-side-card">
      <div class="login-logo">
        <a href="index.html">
          <img src="logo-full.png" alt="رسمي">
        </a>
      </div>

      <span class="login-badge">الدخول إلى حسابك</span>
    </div>

    <div class="login-card login-form-card">
      <h2>تسجيل الدخول</h2>
      <p>ادخل رقم الجوال وكلمة المرور للوصول إلى حسابك</p>

      <div class="login-form">
        <div class="login-field">
          <label for="phone">رقم الجوال</label>
          <input id="phone" placeholder="05xxxxxxxx">
        </div>

        <div class="login-field">
          <label for="password">كلمة المرور</label>
          <div class="login-password-wrap">
            <input id="password" type="password" placeholder="اكتب كلمة المرور">
            <button type="button" id="togglePasswordBtn" aria-label="إظهار أو إخفاء كلمة المرور">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="login-helper-box">
          استخدم نفس رقم الجوال الذي سجلت به الطلب.
        </div>

        <button id="loginBtn" class="login-submit-btn" type="button">دخول</button>
      </div>

      <div class="login-link">
        ليس لديك حساب؟ <a href="request.html">إنشاء حساب</a>
      </div>

      <div class="login-quick-links">
        <a href="index.html">العودة للرئيسية</a>
        <a href="request.html">ابدأ طلبًا جديدًا</a>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyAxshsDZ4yWv6TuinFTx1qMComAJYhqUZI",
  authDomain:"site-orders-415e4.firebaseapp.com",
  projectId:"site-orders-415e4"
});

const auth = getAuth(app);

const loginBtn = document.getElementById("loginBtn");
const phoneInput = document.getElementById("phone");
const passwordInput = document.getElementById("password");
const togglePasswordBtn = document.getElementById("togglePasswordBtn");

togglePasswordBtn.addEventListener("click", ()=>{
  passwordInput.type = passwordInput.type === "password" ? "text" : "password";
});

loginBtn.onclick = async ()=>{

  loginBtn.innerText = "جاري الدخول...";
  loginBtn.disabled = true;

  try{
    const phone = phoneInput.value.trim();
    const password = passwordInput.value;

    if(!/^\d{10}$/.test(phone)){
      throw "رقم الجوال غير صحيح";
    }

    if(password.length < 6){
      throw "كلمة المرور غير صحيحة";
    }

    const email = phone + "@user.com";

    await signInWithEmailAndPassword(auth, email, password);

    window.location.href = "account.html";

  }catch(e){
    alert(e.message || e);
  }finally{
    loginBtn.innerText = "دخول";
    loginBtn.disabled = false;
  }
};
</script>

</body>
</html>
