<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دخول الأدمن</title>

<style>
body{font-family:Tahoma;background:#f7f7f7;margin:0}
.container{max-width:400px;margin:auto;padding:20px}

.card{
background:#fff;
padding:25px;
border-radius:12px;
border:1px solid #eee;
}

h2{text-align:center;margin-bottom:15px}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:8px;
background:#111;
color:#fff;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>دخول الأدمن</h2>

<input id="email" placeholder="البريد الإلكتروني">
<input id="password" type="password" placeholder="كلمة المرور">

<button id="loginBtn">دخول</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyAxshsDZ4yWv6TuinFTx1qMComAJYhqUZI",
authDomain:"site-orders-415e4.firebaseapp.com",
projectId:"site-orders-415e4"
});

const auth = getAuth(app);

document.getElementById("loginBtn").onclick = async ()=>{

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;

try{

await signInWithEmailAndPassword(auth, email, password);

alert("تم الدخول ✅");

window.location.href = "admin.html";

}catch(e){

alert("بيانات غير صحيحة ❌");

}

};

</script>

</body>
</html>
